# Configuración de base de datos del Sistema POS
# Tipos soportados: SQLITE, POSTGRESQL, MYSQL
db.type=SQLITE

# Ruta del archivo SQLite (se crea automáticamente si no existe)
db.sqlite.path=${user.home}/PuntoDeVenta/pos.db

hibernate.show_sql=true
hibernate.format_sql=true
hibernate.use_sql_comments=true

# Configuración PostgreSQL (solo si db.type=POSTGRESQL)
#db.postgresql.host=localhost
#db.postgresql.port=5432
#db.postgresql.database=pos
#db.postgresql.username=postgres
#db.postgresql.password=

# Configuración MySQL (solo si db.type=MYSQL)
#db.mysql.host=localhost
#db.mysql.port=3306
#db.mysql.database=pos
#db.mysql.username=root
#db.mysql.password=

# ── Impresora térmica ESC/POS ──────────────────────────────────────────────
# Nombre exacto de la impresora como aparece en Windows (Panel de control → Dispositivos)
# Dejar vacío para no imprimir (mostrará ticket en pantalla)
ticket.printer.name=
# Ancho del papel: 32 para 58mm, 48 para 80mm
ticket.printer.width=32

# ── Datos del negocio (aparecen en el encabezado del ticket) ───────────────
ticket.negocio.nombre=Mi Negocio
ticket.negocio.direccion=
ticket.negocio.telefono=
ticket.negocio.mensaje=¡Gracias por su compra!
